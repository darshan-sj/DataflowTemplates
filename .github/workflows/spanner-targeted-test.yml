name: Spanner Targeted tests

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - '.github/workflows/spanner-targeted-test.yml'
    inputs:
      testClasses:
        description: 'Test class(es) or test method(s) to run.'
        type: string
        required: false
        default: 'DataStreamToSpannerCDCFT,SpannerToSrcDBMySQLCDCFT'
  workflow_dispatch:
    inputs:
      testClasses:
        description: 'Test class(es) or test method(s) to run.'
        type: string
        required: false
        default: 'DataStreamToSpannerCDCFT,SpannerToSrcDBMySQLCDCFT'

permissions: write-all

jobs:
  spanner_java_targeted_tests_templates:
    name: Spanner Dataflow Templates Targeted Tests
    timeout-minutes: 180
    # Run on any runner that matches all the specified runs-on values.
    runs-on: [ self-hosted, spanner-it ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          ref: ${{ inputs.commitOrTag }}
      - name: Setup Environment
        id: setup-env
        uses: ./.github/actions/setup-env
      - name: Run Integration Tests
        run: |
          ./cicd/run-spanner-staging-it-tests \
          --modules-to-build="v1" \
          --it-region="us-central1" \
          --it-project="span-cloud-teleport-testing" \
          --it-artifact-bucket="span-cloud-teleport-testing-it-gitactions" \
          --it-private-connectivity="datastream-connect-2" \
          --it-cloud-proxy-host="10.128.0.16"
          --it-test-classes=${{ inputs.testClasses }}
      - name: Upload Integration Tests Report
        uses: actions/upload-artifact@v5
        if: always() # always run even if the previous step fails
        with:
          name: surefire-test-results
          path: |
            **/surefire-reports/TEST-*.xml
            **/surefire-reports/*.html
            **/surefire-reports/html/**
          retention-days: 20
      - name: Integration Test report on GitHub
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test report on GitHub
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit
          only-summary: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: 'false'
      - name: Cleanup Java Environment
        uses: ./.github/actions/cleanup-java-env
